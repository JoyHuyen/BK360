# BK360 – Nginx (dev/self-host). Production: đặt khối này sau TLS termination
# hoặc thêm listen 443 ssl + certificate (Let's Encrypt / CA của trường).

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    server_name _;

    # Nén
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Security headers (bổ sung CSP chặt hơn khi FE ổn định)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 64m;   # cho upload ảnh 360°

    # ----- API (động) -----
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ----- Media tĩnh (ảnh 360°, audio, xưa/nay) -----
    location /media/ {
        alias /data/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- Frontend SPA (build đặt ở ./web; hiện là placeholder) -----
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
