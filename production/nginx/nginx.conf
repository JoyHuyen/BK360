# BK360 – Nginx (dev/self-host). Production: đặt khối này sau TLS termination
# hoặc thêm listen 443 ssl + certificate (Let's Encrypt / CA của trường).

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# Micro-cache cho API đọc công khai (chống spike lúc cao điểm sự kiện).
# Request có xác thực (Bearer / cookie rt) sẽ bypass → admin luôn nhận dữ liệu tươi.
proxy_cache_path /var/cache/nginx/bk360 levels=1:2 keys_zone=bk360_api:10m max_size=200m inactive=120s use_temp_path=off;

server {
    listen 80;
    server_name _;

    # Nén
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Security headers (bổ sung CSP chặt hơn khi FE ổn định)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 64m;   # cho upload ảnh 360°

    # ----- API (động) -----
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Micro-cache: chỉ cache GET/HEAD 200 trong 30s; bypass khi có xác thực.
        proxy_cache bk360_api;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 30s;
        proxy_cache_bypass $http_authorization $cookie_rt;
        proxy_no_cache $http_authorization $cookie_rt;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ----- Media tĩnh (ảnh 360°, audio, xưa/nay) -----
    location /media/ {
        alias /data/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- Frontend SPA (build đặt ở ./web; hiện là placeholder) -----
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
