<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bản đồ Bách Khoa — phong cách dễ thương</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fbf3e4; --mint:#e7f6ec; --pink-out:#fbe4e1;
    --road:#e4d8c2; --roaddash:#fffaf0;
    --gold:#ffd25e; --red:#ff7a90;
    --ink:#5b4a45;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Baloo 2","Nunito",system-ui,Arial,sans-serif;background:#cdeede;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;color:var(--ink)}
  .titlebar{margin:14px;background:#fff;border:4px solid #ffd25e;border-radius:24px;
    padding:8px 26px;box-shadow:0 6px 0 #f0c04b;display:flex;align-items:center;gap:10px}
  .titlebar h1{font-size:26px;font-weight:800;color:#ff7a90;letter-spacing:1px}
  .wrap{width:100%;max-width:1080px;padding:6px}
  svg{width:100%;height:auto;display:block;border-radius:22px}
  .bar{margin:6px 12px 0;padding:10px 18px;background:#fff;border:3px solid #ffe0a8;border-radius:18px;
    font-size:15px;font-weight:700;min-height:22px;max-width:1056px;width:calc(100% - 24px)}
  .bar b{color:#ff7a90}
  .bld{cursor:pointer}
  .bld>*{transition:transform .12s}
  .bld:hover{transform:translateY(-3px)}
  .pill{fill:#fff;stroke:#fff;stroke-width:0}
  .lab{font-family:"Baloo 2",sans-serif;font-weight:800;fill:#5b4a45;text-anchor:middle;dominant-baseline:middle;pointer-events:none}
  .rlab{font-family:"Baloo 2",sans-serif;font-weight:700;fill:#a3927e;font-size:13px;letter-spacing:1px}
  footer{font-size:12.5px;color:#7a8a7f;padding:10px 0 18px}
</style>
</head>
<body>
<div class="titlebar"><span style="font-size:24px">🎓</span><h1>BẢN ĐỒ BÁCH KHOA</h1><span style="font-size:22px">💛</span></div>
<div class="bar" id="bar">Chạm vào toà nhà để xem tên nha! ✨</div>
<div class="wrap">
<svg id="map" viewBox="0 0 1250 1070" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3b0"/><stop offset="100%" stop-color="#ffd25e"/>
    </radialGradient>
  </defs>

  <!-- nền -->
  <rect x="0" y="0" width="1250" height="1070" fill="#dff3e6"/>
  <rect x="60" y="100" width="1130" height="900" rx="26" fill="var(--cream)"/>
  <polygon points="610,108 1186,108 1186,640 780,560" fill="var(--pink-out)"/>

  <!-- mặt trời + mây -->
  <g filter="url(#soft)">
    <circle cx="115" cy="150" r="34" fill="url(#sun)"/>
  </g>
  <g fill="#fff" opacity=".9">
    <g transform="translate(940,180)"><circle r="22"/><circle cx="26" cy="6" r="17"/><circle cx="-22" cy="8" r="15"/><rect x="-22" y="6" width="50" height="18" rx="9"/></g>
    <g transform="translate(300,140)"><circle r="16"/><circle cx="20" cy="4" r="12"/><circle cx="-18" cy="6" r="11"/><rect x="-18" y="4" width="40" height="14" rx="7"/></g>
  </g>

  <!-- ===== ĐƯỜNG (bo tròn, pastel) ===== -->
  <g stroke-linecap="round">
    <line x1="-10" y1="92" x2="1260" y2="92" stroke="var(--road)" stroke-width="44"/>
    <line x1="-10" y1="92" x2="1260" y2="92" stroke="var(--roaddash)" stroke-width="3" stroke-dasharray="16 14"/>
    <line x1="58" y1="100" x2="58" y2="670" stroke="var(--road)" stroke-width="38"/>
    <line x1="58" y1="100" x2="58" y2="670" stroke="var(--roaddash)" stroke-width="3" stroke-dasharray="16 14"/>
    <line x1="770" y1="545" x2="990" y2="995" stroke="var(--road)" stroke-width="42"/>
    <line x1="250" y1="1012" x2="1015" y2="690" stroke="var(--road)" stroke-width="42"/>
    <line x1="820" y1="662" x2="1018" y2="320" stroke="var(--road)" stroke-width="26"/>
  </g>
  <text class="rlab" x="980" y="80">ĐẠI CỒ VIỆT</text>
  <text class="rlab" x="46" y="440" transform="rotate(-90 46 440)">GIẢI PHÓNG</text>
  <text class="rlab" x="838" y="700" transform="rotate(63 838 700)">TRẦN ĐẠI NGHĨA</text>
  <text class="rlab" x="430" y="948" transform="rotate(-23 430 948)">LÊ THANH NGHỊ</text>
  <text class="rlab" x="908" y="500" transform="rotate(-60 908 500)" font-size="11">Tạ Quang Bửu</text>

  <!-- ===== sân trong + đài phun + hoa ===== -->
  <g filter="url(#soft)"><rect x="312" y="298" width="216" height="256" rx="20" fill="#cdeccd"/></g>
  <rect x="328" y="312" width="86" height="110" rx="12" fill="#b7e4c7"/>
  <rect x="426" y="312" width="86" height="110" rx="12" fill="#b7e4c7"/>
  <rect x="328" y="432" width="86" height="110" rx="12" fill="#b7e4c7"/>
  <rect x="426" y="432" width="86" height="110" rx="12" fill="#b7e4c7"/>
  <g id="flowers"></g>
  <circle cx="420" cy="427" r="28" fill="#cdeaf6"/><circle cx="420" cy="427" r="17" fill="#8fd4ec"/><circle cx="420" cy="427" r="7" fill="#fff"/>

  <!-- ===== Hồ Tiền (blob) ===== -->
  <g filter="url(#soft)">
    <path d="M165 770 C150 720 200 690 250 696 C310 702 340 720 332 770 C326 812 290 846 240 846 C190 846 175 818 165 770 Z" fill="#9be7ff"/>
  </g>
  <path d="M168 768 C156 724 202 700 250 706 C306 712 332 726 324 768 C318 806 286 836 240 836 C194 836 178 810 168 768 Z" fill="#9be7ff"/>
  <path d="M196 744 q18 -10 36 0" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" opacity=".8"/>
  <path d="M250 792 q18 -10 36 0" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" opacity=".8"/>
  <text class="lab" x="245" y="770" font-size="15">Hồ Tiền 🦆</text>

  <!-- ===== Sân bóng ===== -->
  <g transform="rotate(-23 1080 870)" filter="url(#soft)">
    <rect x="965" y="772" width="228" height="196" rx="14" fill="#9fe09a" stroke="#fff" stroke-width="4"/>
    <line x1="1079" y1="772" x2="1079" y2="968" stroke="#fff" stroke-width="3"/>
    <circle cx="1079" cy="870" r="26" fill="none" stroke="#fff" stroke-width="3"/>
    <rect x="965" y="838" width="30" height="64" fill="none" stroke="#fff" stroke-width="3"/>
    <rect x="1163" y="838" width="30" height="64" fill="none" stroke="#fff" stroke-width="3"/>
    <text x="1079" y="880" text-anchor="middle" font-size="22">⚽</text>
  </g>

  <!-- ===== Bể bơi ===== -->
  <g transform="rotate(-23 855 800)" class="bld" data-name="Bể bơi" data-label="Bể bơi">
    <g filter="url(#soft)"><rect x="775" y="746" width="158" height="108" rx="16" fill="#cdeaf6"/></g>
    <rect x="787" y="758" width="134" height="84" rx="10" fill="#7fd6ec"/>
    <line x1="787" y1="780" x2="921" y2="780" stroke="#fff" stroke-width="2.5" opacity=".8"/>
    <line x1="787" y1="800" x2="921" y2="800" stroke="#fff" stroke-width="2.5" opacity=".8"/>
    <line x1="787" y1="820" x2="921" y2="820" stroke="#fff" stroke-width="2.5" opacity=".8"/>
  </g>

  <g id="buildings"></g>
  <g id="trees"></g>

  <!-- Văn phòng Hội SV -->
  <g transform="translate(1008,150)">
    <g filter="url(#soft)"><rect x="-6" y="-22" width="172" height="176" rx="18" fill="#fff"/></g>
    <text x="80" y="-2" text-anchor="middle" font-size="14" font-weight="800" fill="#ff7a90">VP Hội Sinh Viên 💌</text>
    <text x="6" y="22" font-size="11.5" fill="#7a6a64">📍 Phòng 101, KTX B8</text>
    <text x="6" y="42" font-size="11.5" fill="#7a6a64">✉ hsv@hust.edu.vn</text>
    <rect x="6" y="54" width="148" height="86" rx="12" fill="#bfe3f0"/>
    <text x="80" y="102" text-anchor="middle" font-size="30">🏫</text>
  </g>
</svg>
</div>
<footer>Mô phỏng dễ thương 💕 — tỉ lệ & vị trí mang tính tương đối, không thay bản đồ chính thức.</footer>

<script>
const NS="http://www.w3.org/2000/svg";
const el=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};

// màu theo nhóm (body, mái, cửa)
const PAL={
  tan :{body:"#ffe1b0",roof:"#ffb877",win:"#fff6e6"},
  navy:{body:"#9ad4ec",roof:"#5fb0da",win:"#eaf8ff"},
  blue:{body:"#bce3f2",roof:"#86cce8",win:"#f1fbff"},
  rose:{body:"#ffc6d5",roof:"#ff97b1",win:"#fff0f4"},
};

const BUILDINGS=[
  {x:240,y:232,w:360,h:54,cls:"navy",label:"C1",name:"Nhà C1 — Khu hành chính, các phòng ban"},
  {x:198,y:305,w:58,h:215,cls:"rose",label:"C2",name:"Nhà C2 — Hội trường C2"},
  {x:150,y:548,w:175,h:74,cls:"blue",label:"C9",name:"Nhà C9 — Viện Điện tử-Viễn thông; Viện Kinh tế & Quản lý"},
  {x:545,y:298,w:188,h:46,cls:"tan",label:"C3",name:"Nhà C3"},
  {x:545,y:376,w:188,h:46,cls:"tan",label:"C4",name:"Nhà C4 — Viện Kỹ thuật Hoá học; Viện CNSH & CN Thực phẩm"},
  {x:545,y:454,w:188,h:46,cls:"tan",label:"C5",name:"Nhà C5 — Viện KH&KT Vật liệu; Viện Dệt may & Thời trang"},
  {x:575,y:545,w:170,h:52,cls:"tan",label:"C10",name:"Nhà C10"},
  {x:770,y:300,w:82,h:46,cls:"navy",label:"C6",name:"Nhà C6 — Viện Cơ khí động lực"},
  {x:770,y:378,w:82,h:46,cls:"blue",label:"C7",name:"Nhà C7 — KH&CN Nhiệt lạnh"},
  {x:770,y:456,w:82,h:46,cls:"rose",label:"B1",name:"Nhà B1 — Viện CNTT & Truyền thông"},
  {x:360,y:660,w:165,h:160,cls:"navy",label:"Thư Viện",name:"Thư viện Tạ Quang Bửu",big:true},
  {x:600,y:636,w:120,h:48,cls:"tan",label:"D3",name:"Nhà D3"},
  {x:600,y:714,w:120,h:48,cls:"tan",label:"D5",name:"Nhà D5"},
  {x:330,y:838,w:235,h:56,cls:"tan",label:"D9",name:"Nhà D9"},
  {x:760,y:618,w:42,h:150,cls:"tan",label:"D3-5",vert:true,name:"Nhà D3-5"},
  {x:618,y:790,w:115,h:44,cls:"tan",label:"D7",rot:-37,name:"Nhà D7"},
  {x:1008,y:558,w:122,h:48,cls:"blue",label:"B13",name:"KTX B13"},
  {x:998,y:632,w:122,h:46,cls:"tan",label:"Trạm xá",fs:12,name:"Trạm xá"},
  {x:1028,y:700,w:122,h:48,cls:"blue",label:"B4",name:"KTX B4"},
  {x:1008,y:772,w:122,h:48,cls:"blue",label:"B3",name:"KTX B3"},
  {x:690,y:800,w:72,h:100,cls:"navy",label:"TC",name:"Nhà TC"},
  {x:902,y:688,w:112,h:42,cls:"tan",label:"A17",name:"Nhà A17"},
];

const g=document.getElementById("buildings");
BUILDINGS.forEach(b=>{
  const p=PAL[b.cls], cx=b.x+b.w/2, cy=b.y+b.h/2;
  const grp=el("g",{class:"bld"}); grp.dataset.name=b.name; grp.dataset.label=b.label;
  if(b.rot) grp.setAttribute("transform",`rotate(${b.rot} ${cx} ${cy})`);

  const inner=el("g",{filter:"url(#soft)"});
  // thân
  inner.appendChild(el("rect",{x:b.x,y:b.y,width:b.w,height:b.h,rx:14,fill:p.body}));
  // mái (dải bo trên)
  const roofH=Math.min(Math.max(b.h*0.34,16),30);
  inner.appendChild(el("rect",{x:b.x,y:b.y,width:b.w,height:roofH+14,rx:14,fill:p.roof}));
  inner.appendChild(el("rect",{x:b.x,y:b.y+roofH-2,width:b.w,height:16,fill:p.body}));
  // cửa sổ (hàng chấm) — nếu đủ rộng
  const cols=Math.max(1,Math.floor(b.w/46));
  const gap=b.w/(cols+1), wy=b.y+roofH+ (b.h-roofH)/2 -7;
  if(!b.vert && b.h>40){
    for(let i=1;i<=cols;i++) inner.appendChild(el("rect",{x:b.x+gap*i-7,y:wy,width:14,height:14,rx:4,fill:p.win}));
  }
  if(b.big){ // thư viện: lưới cửa sổ
    inner.innerHTML="";
    inner.appendChild(el("rect",{x:b.x,y:b.y,width:b.w,height:b.h,rx:16,fill:"#fff"}));
    inner.appendChild(el("rect",{x:b.x+8,y:b.y+8,width:b.w-16,height:b.h-16,rx:12,fill:p.body}));
    inner.appendChild(el("rect",{x:b.x+8,y:b.y+8,width:b.w-16,height:30,rx:12,fill:p.roof}));
    for(let r=0;r<3;r++)for(let c=0;c<3;c++)
      inner.appendChild(el("rect",{x:b.x+34+c*42,y:b.y+52+r*34,width:20,height:20,rx:5,fill:p.win}));
  }
  grp.appendChild(inner);

  // nhãn (pill trắng + chữ)
  const fs=b.fs||13, tw=b.label.length*fs*0.62+16;
  const lg=el("g",{}); if(b.vert)lg.setAttribute("transform",`rotate(-90 ${cx} ${cy})`);
  lg.appendChild(el("rect",{x:cx-tw/2,y:cy-12,width:tw,height:24,rx:12,fill:"#fff",opacity:".92"}));
  const tx=el("text",{x:cx,y:cy+1,class:"lab","font-size":fs}); tx.textContent=b.label; lg.appendChild(tx);
  grp.appendChild(lg);

  grp.addEventListener("click",()=>{document.getElementById("bar").innerHTML="<b>"+b.label+"</b> — "+b.name+" 💫";});
  g.appendChild(grp);
});

// hoa trong sân
const fl=document.getElementById("flowers"), FC=["#ff9bb3","#ffd25e","#9be7ff","#fff"];
[[360,350],[470,360],[360,470],[480,500],[420,400],[345,400],[495,430]].forEach((p,i)=>{
  const c=FC[i%FC.length];
  for(let a=0;a<5;a++){const ang=a/5*6.28;fl.appendChild(el("circle",{cx:p[0]+Math.cos(ang)*5,cy:p[1]+Math.sin(ang)*5,r:3.2,fill:c}));}
  fl.appendChild(el("circle",{cx:p[0],cy:p[1],r:3,fill:"#fff7d6"}));
});

// cây mập mạp dễ thương
const TREES=[[120,250],[150,330],[150,410],[150,485],[300,255],[470,250],[300,650],[210,655],
  [700,560],[700,700],[760,180],[640,470],[850,560],[120,560],[470,690]];
const tg=document.getElementById("trees");
TREES.forEach(([x,y])=>{
  const t=el("g",{filter:"url(#soft)"});
  t.appendChild(el("ellipse",{cx:x,cy:y+20,rx:16,ry:6,fill:"rgba(0,0,0,.10)"}));
  t.appendChild(el("rect",{x:x-4,y:y+4,width:8,height:16,rx:3,fill:"#c79b6b"}));
  t.appendChild(el("circle",{cx:x,cy:y-6,r:15,fill:"#86cf7a"}));
  t.appendChild(el("circle",{cx:x-10,cy:y+2,r:11,fill:"#9bdc8c"}));
  t.appendChild(el("circle",{cx:x+10,cy:y+2,r:11,fill:"#9bdc8c"}));
  t.appendChild(el("circle",{cx:x-4,cy:y-9,r:4,fill:"#fff",opacity:".5"}));
  tg.appendChild(t);
});
</script>
</body>
</html>
